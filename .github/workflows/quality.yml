name: Code Quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          packageManager: pnpm@10.33.0

      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm exec biome check .
